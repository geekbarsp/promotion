<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link & Ashe | Identity Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-image: radial-gradient(circle at 50% 50%, #1a022d 0%, #05010a 100%);
            overflow: hidden;
        }
        
        /* Scanline Overlay for the whole page */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .auth-form {
            display: flex; 
            flex-direction: column; 
            gap: 20px;
            position: relative;
            z-index: 5;
        }

        .auth-input {
            width: 100%; 
            padding: 18px; 
            border-radius: 4px; 
            border: 1px solid rgba(188, 19, 254, 0.4);
            background: rgba(10, 2, 20, 0.8); 
            color: #00ffcc; 
            outline: none; 
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
            letter-spacing: 1px;
        }

        .auth-input:focus { 
            border-color: #ff32ff;
            box-shadow: 0 0 15px rgba(255, 50, 255, 0.3);
            background: rgba(20, 5, 40, 0.9);
        }

        .auth-input::placeholder {
            color: rgba(188, 19, 254, 0.5);
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
        }

        /* Scanning Animation for the card */
        .scanner-bar {
            width: 100%;
            height: 2px;
            background: #ff32ff;
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: 0 0 15px #ff32ff;
            animation: scan-move 4s linear infinite;
            z-index: 10;
        }

        @keyframes scan-move {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</head>
<body>
    <header>
    <div class="header-inner">
        <div class="logo-container">
            <img src="assets/logols.png" alt="Logo" class="mini-logo">
            <span>LINK & ASHE</span>
        </div>

        <input type="checkbox" id="menu-toggle" class="menu-toggle">
        <label for="menu-toggle" class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </label>

        <nav class="main-nav">
            <a href="index.html" style="font-family: var(--font-pixel); color: #00ffcc;">[ ← ABORT LOGIN ]</a>
        </nav>

</header>

    <div class="page-container" style="display: flex; align-items: center; justify-content: center; min-height: 90vh;">
        <div class="glass-card" style="width: 100%; max-width: 480px; padding: 60px 40px; border: 1px solid rgba(188,19,254,0.2); position: relative; overflow: hidden; background: rgba(5, 1, 10, 0.85); box-shadow: 0 0 50px rgba(0,0,0,1);">
            
            <div class="scanner-bar"></div>
            
            <div style="text-align: center; margin-bottom: 40px;">
                <h1 class="pixel-heading" style="font-size: 3rem; color: white; margin-bottom: 10px;">IDENTITY <span class="neon-text">CHECK</span></h1>
                <div style="font-family: var(--font-pixel); color: #00ffcc; letter-spacing: 2px; font-size: 0.9rem;">
                    [ STATUS: WAITING FOR CREDENTIALS ]
                </div>
            </div>
            
            <form class="auth-form" action="index.html">
                <div style="position: relative;">
                    <span style="position: absolute; left: -15px; top: 18px; color: #ff32ff; font-family: var(--font-pixel);">></span>
                    <input type="email" class="auth-input" placeholder="USER EMAIL" required>
                </div>
                
                <div style="position: relative;">
                    <span style="position: absolute; left: -15px; top: 18px; color: #ff32ff; font-family: var(--font-pixel);">></span>
                    <input type="password" class="auth-input" placeholder="ACCESS KEY" required>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: -10px; margin-bottom: 10px;">
                    <label style="color: gray; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox" style="accent-color: var(--neon-purple);"> REMEMBER ID
                    </label>
                    <a href="#" style="color: gray; font-size: 0.8rem; text-decoration: none; font-family: var(--font-pixel);">LOST KEY?</a>
                </div>

                <button type="submit" class="btn" style="width: 100%; font-size: 1.5rem; letter-spacing: 3px; padding: 15px; background: none; border: 1px solid #ff32ff; color: #ff32ff; box-shadow: inset 0 0 10px rgba(255, 50, 255, 0.2);">
                    LOGIN
                </button>
            </form>

            <div style="text-align: center; margin-top: 35px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 25px;">
                <p style="color: rgba(255,255,255,0.5); font-size: 0.9rem;">
                    UNREGISTERED ENTITY? 
                    <a href="signup.html" style="color: #00ffcc; text-decoration: none; font-family: var(--font-pixel); margin-left: 10px; border-bottom: 1px solid #00ffcc;">CREATE NEW ID</a>
                </p>
            </div>

            <div style="margin-top: 40px; display: flex; justify-content: space-between; font-family: var(--font-pixel); font-size: 0.7rem; color: rgba(188, 19, 254, 0.4);">
                <span>IP TRACE: ACTIVE</span>
                <span>SECURE LINK: ESTABLISHED</span>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
